apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-nginx
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-nginx
  template:
    metadata:
      labels:
        app: demo-nginx
  spec:
    containers:
    - name: nginx
      image: nginx:alpine
      ports:
      - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-nginx-service
  namespace: default
spec:
  ports:
  - port: 80
  selector:
    app: demo-nginx
